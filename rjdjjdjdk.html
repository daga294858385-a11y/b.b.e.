<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.B.E - Shymkent Oracle</title>
    <style>
        /* ЧИСТЫЙ ЧЕРНЫЙ ФОН */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            height: 100%;
            overflow-x: hidden;
            user-select: none;
        }

        /* ШАПКА */
        #header-img {
            width: 100%;
            height: auto;
            max-height: 120px;
            object-fit: cover;
            display: block;
        }

        /* ЛЕДЕНЕЦ (Вращение) */
        #lollipop-container {
            text-align: center;
            margin-top: 40px;
        }

        #lollipop {
            width: 180px;
            height: 180px;
            object-fit: contain;
        }

        /* ТЕКСТОВЫЕ БЛОКИ (БЕЗ PNG ПОКА ЧТО) */
        .text-header {
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ЗОНА ДЛЯ ВЫЗОВА КЛАВИАТУРЫ */
        #trigger-zone {
            width: 100%;
            height: 120px;
            margin-top: 30px;
            cursor: pointer;
        }

        /* КЛАВИАТУРА */
        #keyboard {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding-bottom: 50px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .key {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 30px;
            height: 35px;
            background: #000;
            border: 1px solid #222; /* Едва заметная граница клавиш */
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .key:active {
            color: #555;
            border-color: #555;
        }

        /* ЭКРАНЫ */
        #main-screen, #order-screen, #geo-blocked-screen {
            display: none;
        }

        /* ОФОРМЛЕНИЕ И БЛОКИРОВКА */
        #order-screen, #geo-blocked-screen {
            padding: 20px;
            text-align: center;
        }

        .item-list img {
            width: 90px;
            height: 90px;
            margin: 10px;
            border: 1px solid #111;
        }

        input, button {
            background: #000;
            color: #fff;
            border: 1px solid #333;
            padding: 12px;
            margin: 10px 0;
            width: 85%;
            max-width: 350px;
            font-family: monospace;
        }

        button {
            cursor: pointer;
            background: #111;
        }
    </style>
</head>
<body>

    <audio id="bg-audio" loop src="ПРИ.mp3"></audio>
    <audio id="click-audio" src="НАЖА.mp3"></audio>

    <div id="main-screen" style="display: block;">
        <img id="header-img" src="header.png" alt="">
        
        <div id="lollipop-container">
            <img id="lollipop" src="spin1.png" alt="[ARTIFACT]">
        </div>

        <div class="text-header">АКТИВИРОВАТЬ КОД ПОД ЛЕДЕНЦОМ</div>

        <div id="trigger-zone"></div>

        <div id="keyboard"></div>
    </div>

    <div id="geo-blocked-screen">
        <div class="text-header" style="color: red;">ДОСТУП ЗАПРЕЩЕН</div>
        <p style="margin-top: 50px; padding: 20px; line-height: 1.6;">
            Простите, ваша страна и ваш типо закон не давала разрешения на доставку Bark_Beetle.Erer!
        </p>
    </div>

    <div id="order-screen">
        <div class="text-header">ОФОРМЛЕНИЕ ДОСТАВКИ</div>
        <p style="color: #444;">Bark_Beetle.Erer | Limited: 10 units</p>
        
        <div class="item-list">
            <img src="item1.png" alt="">
            <img src="item2.png" alt="">
            <img src="item3.png" alt="">
        </div>

        <form id="delivery-form" action="https://formspree.io/f/5931c081-de5a-458f-b1ab-824418ecfd61" method="POST">
            <input type="text" name="name" placeholder="ИМЯ" required>
            <input type="text" name="address" placeholder="ИНДЕКС И АДРЕС" required>
            <input type="number" name="count" placeholder="КОЛ-ВО (ДО 10)" max="10" min="1" required>
            <input type="hidden" name="location" id="coords-input">
            
            <button type="submit">ОТПРАВИТЬ ДАННЫЕ</button>
        </form>
    </div>

    <script>
        const bgAudio = document.getElementById('bg-audio');
        const clickAudio = document.getElementById('click-audio');

        function playClick() {
            clickAudio.currentTime = 0;
            clickAudio.play().catch(() => {});
        }

        // ВРАЩЕНИЕ (300мс - медленно)
        const frames = ['spin1.png', 'spin2.png', 'spin3.png', 'spin4.png'];
        let curFrame = 0;
        setInterval(() => {
            curFrame = (curFrame + 1) % frames.length;
            document.getElementById('lollipop').src = frames[curFrame];
        }, 300);

        // КЛАВИАТУРА
        const layout = [
            ['й','ц','у','к','е','н','г','ш','щ','з','х','ъ'],
            ['ф','ы','в','а','п','р','о','л','д','ж','э'],
            ['я','ч','с','м','и','т','ь','б','ю','.']
        ];
        const kb = document.getElementById('keyboard');
        let buffer = "";

        layout.forEach(row => {
            const div = document.createElement('div');
            div.className = 'keyboard-row';
            row.forEach(char => {
                const key = document.createElement('div');
                key.className = 'key';
                key.textContent = char;
                key.onclick = () => {
                    playClick();
                    buffer += char;
                    if (buffer.includes('орлянка')) {
                        checkGeo();
                        buffer = "";
                    }
                    if (buffer.length > 15) buffer = buffer.slice(-15);
                };
                div.appendChild(key);
            });
            kb.appendChild(div);
        });

        document.getElementById('trigger-zone').onclick = () => {
            playClick();
            kb.style.display = 'flex';
            bgAudio.play().catch(() => {});
        };

        // ПРОВЕРКА ГЕО (ШЫМКЕНТ)
        function checkGeo() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    document.getElementById('coords-input').value = `lat:${lat}, lon:${lon}`;

                    // Границы Шымкента
                    if (lat >= 42.2 && lat <= 42.6 && lon >= 69.4 && lon <= 69.8) {
                        document.getElementById('main-screen').style.display = 'none';
                        document.getElementById('order-screen').style.display = 'block';
                    } else {
                        showBlocked();
                    }
                }, showBlocked);
            } else {
                showBlocked();
            }
        }

        function showBlocked() {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('geo-blocked-screen').style.display = 'block';
        }

        // Звук на инпутах
        document.querySelectorAll('input').forEach(i => {
            i.oninput = playClick;
        });
    </script>
</body>
</html>
